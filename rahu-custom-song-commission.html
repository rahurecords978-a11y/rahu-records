<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Song Commission — R.A.H.U. Records</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0a0908;
    --black-2:#141210;
    --gold:#c9a227;
    --gold-bright:#e8c96a;
    --maroon:#6e1f2a;
    --bone:#ece4d3;
    --bone-dim:#a89f8c;
    --line:rgba(201,162,39,0.25);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse at top, #1a1613 0%, var(--black) 60%);
    color:var(--bone);
    font-family:'Jost',sans-serif;
    min-height:100vh;
    padding:40px 20px 100px;
  }
  .wrap{max-width:720px;margin:0 auto;}

  /* Header */
  .brand{text-align:center;margin-bottom:8px;}
  .brand .seal{
    width:56px;height:56px;margin:0 auto 14px;
    display:flex;align-items:center;justify-content:center;
    color:var(--gold);
  }
  .brand h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:2.1rem;
    letter-spacing:0.04em;
    color:var(--bone);
  }
  .brand .sub{
    font-size:0.8rem;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--gold);
    margin-top:6px;
  }
  .brand p.tag{
    color:var(--bone-dim);
    font-size:0.92rem;
    margin-top:14px;
    line-height:1.5;
  }

  /* Star progress tracker */
  .tracker{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:44px 0 40px;
    position:relative;
  }
  .tracker::before{
    content:'';
    position:absolute;
    top:14px;left:22px;right:22px;
    height:1px;
    background:var(--line);
    z-index:0;
  }
  .step-marker{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    flex:1;
  }
  .step-marker .star{
    width:28px;height:28px;
    color:var(--bone-dim);
    opacity:0.4;
    transition:all .35s ease;
  }
  .step-marker.active .star,
  .step-marker.done .star{
    color:var(--gold);
    opacity:1;
    filter:drop-shadow(0 0 6px rgba(201,162,39,0.5));
  }
  .step-marker .label{
    font-size:0.62rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--bone-dim);
    text-align:center;
  }
  .step-marker.active .label{color:var(--gold-bright);}

  /* Card */
  .card{
    background:linear-gradient(180deg, var(--black-2), #0d0b09);
    border:1px solid var(--line);
    border-radius:2px;
    padding:36px 32px;
    position:relative;
  }
  .card::before,.card::after{
    content:'';
    position:absolute;
    width:16px;height:16px;
    border:1px solid var(--gold);
    opacity:0.6;
  }
  .card::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
  .card::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}

  .step-title{
    font-family:'Cormorant Garamond',serif;
    font-size:1.5rem;
    font-weight:600;
    color:var(--bone);
    margin-bottom:6px;
  }
  .step-desc{
    color:var(--bone-dim);
    font-size:0.88rem;
    margin-bottom:28px;
    line-height:1.5;
  }

  /* Genre grid */
  .genre-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-bottom:8px;
  }
  @media(min-width:480px){.genre-grid{grid-template-columns:repeat(2,1fr);}}

  .genre-card{
    border:1px solid var(--line);
    background:rgba(201,162,39,0.03);
    padding:16px 14px;
    cursor:pointer;
    transition:all .25s ease;
    position:relative;
  }
  .genre-card:hover{border-color:var(--gold);background:rgba(201,162,39,0.07);}
  .genre-card.selected{
    border-color:var(--gold);
    background:rgba(201,162,39,0.12);
    box-shadow:inset 0 0 0 1px var(--gold);
  }
  .genre-name{
    font-size:0.95rem;
    color:var(--bone);
    font-weight:500;
    margin-bottom:10px;
  }
  .genre-card.selected .genre-name{color:var(--gold-bright);}

  /* audio player row */
  .beat-player{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .play-btn{
    width:30px;height:30px;
    border-radius:50%;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    font-size:0.7rem;
    transition:all .2s ease;
  }
  .play-btn:hover{background:var(--gold);color:var(--black);}
  .play-btn.playing{background:var(--gold);color:var(--black);}
  .beat-label{
    font-size:0.7rem;
    color:var(--bone-dim);
    letter-spacing:0.05em;
  }
  audio{display:none;}

  /* Lyrics step */
  textarea, input[type="text"], select{
    width:100%;
    background:rgba(255,255,255,0.02);
    border:1px solid var(--line);
    color:var(--bone);
    font-family:'Jost',sans-serif;
    font-size:0.92rem;
    padding:14px;
    border-radius:1px;
    outline:none;
    transition:border-color .2s ease;
  }
  textarea:focus, input[type="text"]:focus, select:focus{border-color:var(--gold);}
  textarea{min-height:220px;resize:vertical;line-height:1.6;}
  .field{margin-bottom:20px;}
  .field label{
    display:block;
    font-size:0.72rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:8px;
  }
  .char-count{
    text-align:right;
    font-size:0.7rem;
    color:var(--bone-dim);
    margin-top:6px;
  }
  .lang-note{
    display:inline-block;
    font-size:0.7rem;
    color:var(--bone-dim);
    border:1px solid var(--line);
    padding:4px 10px;
    margin-bottom:20px;
    letter-spacing:0.04em;
  }

  /* Nav buttons */
  .nav-row{
    display:flex;
    justify-content:space-between;
    margin-top:32px;
  }
  .btn{
    font-family:'Jost',sans-serif;
    font-size:0.78rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding:13px 26px;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold);
    cursor:pointer;
    transition:all .25s ease;
  }
  .btn:hover{background:var(--gold);color:var(--black);}
  .btn.primary{background:var(--gold);color:var(--black);}
  .btn.primary:hover{background:var(--gold-bright);border-color:var(--gold-bright);}
  .btn:disabled{opacity:0.3;cursor:not-allowed;}
  .btn:disabled:hover{background:transparent;color:var(--gold);}
  .btn.primary:disabled:hover{background:var(--gold);}

  .selection-summary{
    margin-top:24px;
    padding-top:20px;
    border-top:1px solid var(--line);
    font-size:0.8rem;
    color:var(--bone-dim);
  }
  .selection-summary b{color:var(--gold);font-weight:500;}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="seal">
      <svg viewBox="0 0 100 100" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1">
        <polygon points="50,4 61,35 92,29 68,50 92,71 61,65 50,96 39,65 8,71 32,50 8,29 39,35"/>
        <circle cx="50" cy="50" r="30"/>
      </svg>
    </div>
    <h1>KEUNGDOM</h1>
    <div class="sub">R.A.H.U. Records — Custom Song Commission</div>
    <p class="tag">Your story, produced. Choose a sound, write what's real, and we build the record around it.</p>
  </div>

  <div class="tracker" id="tracker"></div>

  <div class="card">
    <div id="step-content"></div>

    <div class="nav-row">
      <button class="btn" id="backBtn" onclick="prevStep()">Back</button>
      <button class="btn primary" id="nextBtn" onclick="nextStep()">Next</button>
    </div>
  </div>

</div>

<script>
const STEPS = [
  {key:'contact', label:'Who'},
  {key:'genre', label:'Genre'},
  {key:'lyrics', label:'Lyrics'},
  {key:'details', label:'Details'},
  {key:'review', label:'Review'}
];

const GENRES = [
  {id:'hiphop', name:'Hip-Hop / Trap'},
  {id:'rnb', name:'R&B'},
  {id:'pop', name:'Pop'},
  {id:'afrobeats', name:'Afrobeats'},
  {id:'edm', name:'EDM / Dance'},
  {id:'acoustic', name:'Acoustic / Singer-Songwriter'},
  {id:'drill', name:'Drill'},
  {id:'country', name:'Country'},
  {id:'ballad', name:'Ballad'},
  {id:'rock', name:'Rock'}
];

let current = 0;
let currentlyPlaying = null;

const state = {
  name:'', email:'',
  genre:null,
  lyrics:'', theme:'',
  occasion:'', deliveryNotes:''
};

const starSVG = `<svg class="star" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4">
  <polygon points="50,4 61,35 92,29 68,50 92,71 61,65 50,96 39,65 8,71 32,50 8,29 39,35"/>
</svg>`;

function renderTracker(){
  const t = document.getElementById('tracker');
  t.innerHTML = STEPS.map((s,i)=>{
    let cls='step-marker';
    if(i===current) cls+=' active';
    else if(i<current) cls+=' done';
    return `<div class="${cls}">${starSVG}<div class="label">${s.label}</div></div>`;
  }).join('');
}

function renderStep(){
  const c = document.getElementById('step-content');
  const key = STEPS[current].key;

  if(key==='contact'){
    c.innerHTML = `
      <div class="step-title">Let's start with you</div>
      <div class="step-desc">Who's this record for?</div>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="in-name" value="${state.name}" placeholder="Your name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="text" id="in-email" value="${state.email}" placeholder="you@email.com">
      </div>
    `;
  }

  if(key==='genre'){
    c.innerHTML = `
      <div class="step-title">Pick your sound</div>
      <div class="step-desc">Preview a beat style for each genre, then select the one that fits your song.</div>
      <div class="genre-grid">
        ${GENRES.map(g=>`
          <div class="genre-card ${state.genre===g.id?'selected':''}" data-genre="${g.id}" onclick="selectGenre('${g.id}')">
            <div class="genre-name">${g.name}</div>
            <div class="beat-player">
              <button class="play-btn" data-audio="${g.id}" onclick="event.stopPropagation(); togglePlay('${g.id}')">▶</button>
              <span class="beat-label">Preview</span>
            </div>
            <audio id="audio-${g.id}" src="beats/${g.id}-sample.mp3"></audio>
          </div>
        `).join('')}
      </div>
    `;
  }

  if(key==='lyrics'){
    c.innerHTML = `
      <div class="step-title">Write it your way</div>
      <div class="step-desc">Give us the words, the story, or just the raw feeling — we'll shape it into a finished song.</div>
      <div class="lang-note">Lyrics language: English (more languages coming soon)</div>
      <div class="field">
        <label>Theme / What's this song about</label>
        <input type="text" id="in-theme" value="${state.theme}" placeholder="e.g. a comeback, a love story, a tribute">
      </div>
      <div class="field">
        <label>Your Lyrics or Words (optional — write as much or as little as you have)</label>
        <textarea id="in-lyrics" placeholder="Paste your lyrics, a poem, a voice memo transcript, or just bullet points of what you want said...">${state.lyrics}</textarea>
        <div class="char-count"><span id="char-count">0</span> characters</div>
      </div>
    `;
    const ta = document.getElementById('in-lyrics');
    const cc = document.getElementById('char-count');
    cc.textContent = ta.value.length;
    ta.addEventListener('input', ()=>{ cc.textContent = ta.value.length; });
  }

  if(key==='details'){
    c.innerHTML = `
      <div class="step-title">A few final details</div>
      <div class="step-desc">Anything that helps us get the vibe right.</div>
      <div class="field">
        <label>Occasion (optional)</label>
        <input type="text" id="in-occasion" value="${state.occasion}" placeholder="e.g. wedding, birthday, memorial, just because">
      </div>
      <div class="field">
        <label>Delivery Notes (optional)</label>
        <textarea id="in-notes" placeholder="Any deadline, reference artist, or extra direction...">${state.deliveryNotes}</textarea>
      </div>
    `;
  }

  if(key==='review'){
    const g = GENRES.find(x=>x.id===state.genre);
    c.innerHTML = `
      <div class="step-title">Review your commission</div>
      <div class="step-desc">Take one last look before we send this in.</div>
      <div class="selection-summary">
        <p><b>Name:</b> ${state.name || '—'}</p>
        <p><b>Email:</b> ${state.email || '—'}</p>
        <p><b>Genre:</b> ${g ? g.name : '—'}</p>
        <p><b>Theme:</b> ${state.theme || '—'}</p>
        <p><b>Lyrics provided:</b> ${state.lyrics ? state.lyrics.length + ' characters' : 'None — open to full creative direction'}</p>
        <p><b>Occasion:</b> ${state.occasion || '—'}</p>
      </div>
    `;
  }

  document.getElementById('backBtn').disabled = current===0;
  document.getElementById('nextBtn').textContent = current===STEPS.length-1 ? 'Submit Commission' : 'Next';
}

function selectGenre(id){
  state.genre = id;
  renderStep();
}

function togglePlay(id){
  const audio = document.getElementById('audio-'+id);
  const btn = document.querySelector(`.play-btn[data-audio="${id}"]`);
  if(currentlyPlaying && currentlyPlaying!==id){
    const prevAudio = document.getElementById('audio-'+currentlyPlaying);
    const prevBtn = document.querySelector(`.play-btn[data-audio="${currentlyPlaying}"]`);
    if(prevAudio){ prevAudio.pause(); prevAudio.currentTime=0; }
    if(prevBtn){ prevBtn.textContent='▶'; prevBtn.classList.remove('playing'); }
  }
  if(audio.paused){
    audio.play().catch(()=>{ /* placeholder file not yet uploaded */ });
    btn.textContent='❚❚';
    btn.classList.add('playing');
    currentlyPlaying = id;
  } else {
    audio.pause();
    audio.currentTime = 0;
    btn.textContent='▶';
    btn.classList.remove('playing');
    currentlyPlaying = null;
  }
}

function saveCurrentInputs(){
  const key = STEPS[current].key;
  if(key==='contact'){
    state.name = document.getElementById('in-name').value;
    state.email = document.getElementById('in-email').value;
  }
  if(key==='lyrics'){
    state.theme = document.getElementById('in-theme').value;
    state.lyrics = document.getElementById('in-lyrics').value;
  }
  if(key==='details'){
    state.occasion = document.getElementById('in-occasion').value;
    state.deliveryNotes = document.getElementById('in-notes').value;
  }
}

function nextStep(){
  saveCurrentInputs();
  if(current === STEPS.length-1){
    alert('Commission submitted. (Firebase submission hook goes here.)');
    return;
  }
  current++;
  renderTracker();
  renderStep();
  window.scrollTo({top:0, behavior:'smooth'});
}

function prevStep(){
  saveCurrentInputs();
  if(current===0) return;
  current--;
  renderTracker();
  renderStep();
  window.scrollTo({top:0, behavior:'smooth'});
}

renderTracker();
renderStep();
</script>
</body>
</html>
